<!DOCTYPE html>
<html>
<head>
    <title>Constellation — Navigate by Creation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main canvas for constellation -->
    <canvas id="constellation"></canvas>
    
    <!-- Creation panel (fixed top) -->
    <div id="creation-panel">
        <textarea id="user-input" placeholder="What's on your mind?"></textarea>
        <div id="nearby-preview"></div>
        <div id="controls">
            <button id="generate-btn">Generate Perspectives</button>
            <button id="god-btn">God Generate</button>
            <button id="clear-btn">Clear Constellation</button>
        </div>
    </div>
    
    <!-- Profile modal (hidden by default) -->
    <div id="profile-modal" class="hidden">
        <div class="profile-content">
            <div class="avatar"></div>
            <h2 class="username"></h2>
            <p class="bio"></p>
            <img id="profile-image" src="" alt="" />
            <div class="synthetic-badge hidden">SYNTHETIC</div>
            <div class="stats"></div>
        </div>
    </div>
    
    <!-- Status overlay -->
    <div id="status"></div>
    
    <script src="main.js"></script>
</body>
</html>
