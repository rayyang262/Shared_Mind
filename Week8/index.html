<!DOCTYPE html>
<html lang="en">
<head>
  <title>The Elevator — Shared Mind Week 8</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }

    #canvas-container { position: absolute; inset: 0; z-index: 1; }

    /* ── Loading screen ──────────────────────────────── */
    #loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: rgba(255,200,80,0.8);
      font-size: 13px; letter-spacing: 6px; z-index: 100;
      gap: 16px;
    }
    #loading-sub { color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 3px; }

    /* ── HUD (position readout) ──────────────────────── */
    #hud {
      position: absolute; top: 22px; left: 22px; z-index: 10;
      pointer-events: none; line-height: 2.2; font-size: 11px;
    }
    .hud-row { display: flex; align-items: center; gap: 8px; }
    .hud-label { color: rgba(255,255,255,0.28); width: 90px; letter-spacing: 2px; font-size: 9px; }
    .hud-bar-track { width: 80px; height: 3px; background: rgba(255,255,255,0.08); }
    .hud-bar-fill  { height: 3px; background: rgba(255,200,80,0.6); transition: width 0.4s ease; }
    .hud-val { color: rgba(255,200,80,0.7); font-size: 10px; width: 30px; }

    /* ── Online users panel ──────────────────────────── */
    #users-panel {
      position: absolute; top: 22px; right: 22px; z-index: 10;
      pointer-events: none; font-size: 10px; text-align: right;
      line-height: 2;
    }
    .user-entry { display: flex; align-items: center; justify-content: flex-end; gap: 7px; }
    .user-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    /* ── Navigation arrows ───────────────────────────── */
    #nav-arrows { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

    .nav-arrow {
      position: absolute; width: 52px; height: 52px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5); font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; pointer-events: all;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      user-select: none; -webkit-user-select: none;
    }
    .nav-arrow:hover {
      background: rgba(255,200,80,0.12);
      border-color: rgba(255,200,80,0.4);
      color: rgba(255,200,80,0.9);
    }
    .nav-arrow:active { background: rgba(255,200,80,0.22); }

    /* Positions: centred cross layout */
    #arrow-up    { top:50%; left:50%; transform:translate(-50%, -90px); }
    #arrow-down  { top:50%; left:50%; transform:translate(-50%,  38px); }
    #arrow-left  { top:50%; left:50%; transform:translate(-130px,-26px); }
    #arrow-right { top:50%; left:50%; transform:translate(  78px,-26px); }
    /* Z axis: sides of screen */
    #arrow-forward  { top:50%; right:26px; transform:translateY(-26px); }
    #arrow-backward { top:50%; left:26px;  transform:translateY(-26px); }

    /* ── Hover tooltip ───────────────────────────────── */
    #hint-tooltip {
      position: absolute; z-index: 20; pointer-events: none;
      background: rgba(0,0,0,0.88);
      border: 1px solid rgba(255,200,80,0.3);
      color: rgba(255,200,80,0.85); padding: 10px 14px;
      font-size: 11px; max-width: 220px; line-height: 1.6;
      opacity: 0; transition: opacity 0.25s;
    }
    #hint-tooltip.visible { opacity: 1; }
    #hint-tooltip strong { color: rgba(255,255,255,0.8); display: block; margin-bottom: 3px; }
    #hint-tooltip .nearby { color: rgba(100,220,180,0.8); margin-top: 6px; font-size: 10px; }

    /* ── Axis legend (bottom-left) ───────────────────── */
    #axis-legend {
      position: absolute; bottom: 80px; left: 22px; z-index: 10;
      pointer-events: none; font-size: 9px; line-height: 2;
      color: rgba(255,255,255,0.2); letter-spacing: 1px;
    }
    #axis-legend span { color: rgba(255,200,80,0.4); }

    /* ── Z-axis mini indicator ───────────────────────── */
    #z-indicator {
      position: absolute; top: 50%; right: 90px; z-index: 10;
      transform: translateY(-50%); pointer-events: none;
      writing-mode: vertical-rl; color: rgba(255,255,255,0.15);
      font-size: 8px; letter-spacing: 2px;
    }

    /* ── Post UI (bottom center) ─────────────────────── */
    #post-ui {
      position: absolute; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 10;
      align-items: center;
    }
    #post-input {
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,200,80,0.25);
      border-radius: 0;
      color: rgba(255,255,255,0.85); padding: 9px 14px;
      font-size: 12px; font-family: 'Courier New', monospace;
      width: 300px; outline: none;
      transition: border-color 0.2s;
    }
    #post-input:focus { border-color: rgba(255,200,80,0.55); }
    #post-input::placeholder { color: rgba(255,255,255,0.2); }
    #post-btn {
      background: rgba(255,200,80,0.1);
      border: 1px solid rgba(255,200,80,0.3);
      color: rgba(255,200,80,0.8); padding: 9px 18px;
      cursor: pointer; font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 2px;
      transition: background 0.2s;
    }
    #post-btn:hover { background: rgba(255,200,80,0.25); }

    /* ── Content popup (floating labels in screen-space) */
    .content-label {
      position: absolute; z-index: 15; pointer-events: none;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(100,220,180,0.3);
      color: rgba(100,220,180,0.85);
      padding: 5px 9px; font-size: 10px; max-width: 160px;
      line-height: 1.4; opacity: 0; transition: opacity 0.5s;
    }
    .content-label.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="loading">
    ENTERING THE BUILDING
    <div id="loading-sub">signing in...</div>
  </div>

  <div id="canvas-container"></div>

  <!-- Navigation Arrows -->
  <div id="nav-arrows">
    <div class="nav-arrow" id="arrow-up"       data-dir="up">↑</div>
    <div class="nav-arrow" id="arrow-down"     data-dir="down">↓</div>
    <div class="nav-arrow" id="arrow-left"     data-dir="left">←</div>
    <div class="nav-arrow" id="arrow-right"    data-dir="right">→</div>
    <div class="nav-arrow" id="arrow-forward"  data-dir="forward" title="deeper (Z+)">⊙</div>
    <div class="nav-arrow" id="arrow-backward" data-dir="backward" title="shallower (Z-)">⊗</div>
  </div>

  <div id="hint-tooltip"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">
      <div class="hud-label">INTIMACY</div>
      <div class="hud-bar-track"><div class="hud-bar-fill" id="bar-x" style="width:50%"></div></div>
      <div class="hud-val" id="val-x">50</div>
    </div>
    <div class="hud-row">
      <div class="hud-label">RESONANCE</div>
      <div class="hud-bar-track"><div class="hud-bar-fill" id="bar-y" style="width:50%"></div></div>
      <div class="hud-val" id="val-y">50</div>
    </div>
    <div class="hud-row">
      <div class="hud-label">ENERGY</div>
      <div class="hud-bar-track"><div class="hud-bar-fill" id="bar-z" style="width:50%"></div></div>
      <div class="hud-val" id="val-z">50</div>
    </div>
  </div>

  <div id="axis-legend">
    ← <span>public</span> · <span>private</span> →<br>
    ↓ <span>friction</span> · <span>resonance</span> ↑<br>
    ⊗ <span>ambient</span> · <span>urgent</span> ⊙
  </div>

  <div id="z-indicator">DEPTH</div>

  <div id="users-panel"></div>

  <div id="post-ui">
    <input id="post-input" type="text" placeholder="type a thought → generates an image · move arrows to morph it" maxlength="180">
    <button id="post-btn">transmit</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
