<!DOCTYPE html>
<html lang="en">
<head>
  <title>The Elevator — Shared Mind Week 8</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000810; overflow: hidden; font-family: 'Courier New', monospace; color: white; }

    #canvas-container { position: absolute; inset: 0; z-index: 1; }

    /* ── Vignette + scanlines ─────────────────────────── */
    #vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(0,4,12,0.75) 100%);
    }
    #scanlines {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    }

    /* ── Loading screen ──────────────────────────────── */
    #loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000810; color: rgba(255,200,80,0.9);
      font-size: 13px; letter-spacing: 6px; z-index: 100; gap: 16px;
    }
    #loading::before {
      content: ''; display: block; width: 40px; height: 1px;
      background: rgba(255,200,80,0.4); animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    #loading-sub { color: rgba(80,170,220,0.5); font-size: 10px; letter-spacing: 3px; }

    /* ── HUD panel ───────────────────────────────────── */
    #hud {
      position: absolute; top: 22px; left: 22px; z-index: 10;
      pointer-events: none; line-height: 2.2; font-size: 11px;
      background: rgba(0,6,18,0.8);
      border: 1px solid rgba(30,80,130,0.45);
      border-left: 2px solid rgba(255,200,80,0.4);
      padding: 12px 16px 10px;
    }
    .hud-row { display: flex; align-items: center; gap: 10px; }
    .hud-label { color: rgba(80,170,220,0.7); width: 92px; letter-spacing: 2px; font-size: 9px; }
    .hud-bar-track {
      width: 80px; height: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hud-bar-fill {
      height: 4px;
      background: linear-gradient(90deg, rgba(255,160,40,0.55), rgba(255,220,90,0.95));
      transition: width 0.4s ease;
    }
    .hud-val { color: rgba(255,215,80,0.95); font-size: 10px; width: 30px; font-weight: bold; }

    /* ── Online users panel ──────────────────────────── */
    #users-panel {
      position: absolute; top: 22px; right: 22px; z-index: 10;
      pointer-events: none; font-size: 10px; text-align: right; line-height: 2;
      background: rgba(0,6,18,0.7); border: 1px solid rgba(30,80,130,0.35);
      padding: 6px 10px; min-width: 80px;
    }
    .user-entry { display: flex; align-items: center; justify-content: flex-end; gap: 7px; }
    .user-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    /* ── Navigation arrows ───────────────────────────── */
    #nav-arrows { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

    .nav-arrow {
      position: absolute; width: 50px; height: 50px;
      background: rgba(0,8,22,0.72);
      border: 1px solid rgba(40,100,160,0.45);
      color: rgba(80,170,220,0.65); font-size: 19px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; pointer-events: all;
      transition: background 0.18s, border-color 0.18s, color 0.18s, box-shadow 0.18s;
      user-select: none; -webkit-user-select: none;
    }
    .nav-arrow:hover {
      background: rgba(255,200,60,0.1);
      border-color: rgba(255,200,60,0.55);
      color: rgba(255,215,80,1);
      box-shadow: 0 0 14px rgba(255,200,60,0.2), inset 0 0 10px rgba(255,200,60,0.06);
    }
    .nav-arrow:active {
      background: rgba(255,200,60,0.2);
      box-shadow: 0 0 20px rgba(255,200,60,0.3);
    }

    /* Positions: centred cross layout */
    #arrow-up    { top:50%; left:50%; transform:translate(-50%, -90px); }
    #arrow-down  { top:50%; left:50%; transform:translate(-50%,  38px); }
    #arrow-left  { top:50%; left:50%; transform:translate(-130px,-26px); }
    #arrow-right { top:50%; left:50%; transform:translate(  78px,-26px); }
    #arrow-forward  { top:50%; right:26px; transform:translateY(-26px); }
    #arrow-backward { top:50%; left:26px;  transform:translateY(-26px); }

    /* ── Hover tooltip ───────────────────────────────── */
    #hint-tooltip {
      position: absolute; z-index: 20; pointer-events: none;
      background: rgba(0,6,18,0.92);
      border: 1px solid rgba(255,200,60,0.35);
      border-left: 2px solid rgba(255,200,60,0.6);
      color: rgba(255,200,80,0.9); padding: 10px 14px;
      font-size: 11px; max-width: 220px; line-height: 1.7;
      opacity: 0; transition: opacity 0.22s;
    }
    #hint-tooltip.visible { opacity: 1; }
    #hint-tooltip strong { color: rgba(255,255,255,0.85); display: block; margin-bottom: 3px; }
    #hint-tooltip .nearby { color: rgba(100,220,180,0.85); margin-top: 6px; font-size: 10px; }

    /* ── Axis legend ─────────────────────────────────── */
    #axis-legend {
      position: absolute; bottom: 80px; left: 22px; z-index: 10;
      pointer-events: none; font-size: 9px; line-height: 2.1;
      color: rgba(80,170,220,0.35); letter-spacing: 1px;
      background: rgba(0,6,18,0.7); border: 1px solid rgba(30,80,130,0.3);
      padding: 7px 11px;
    }
    #axis-legend span { color: rgba(255,200,60,0.55); }

    /* ── Z-axis mini indicator ───────────────────────── */
    #z-indicator {
      position: absolute; top: 50%; right: 90px; z-index: 10;
      transform: translateY(-50%); pointer-events: none;
      writing-mode: vertical-rl; color: rgba(80,170,220,0.2);
      font-size: 8px; letter-spacing: 2px;
    }

    /* ── Post UI ─────────────────────────────────────── */
    #post-ui {
      position: absolute; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 0; z-index: 10; align-items: stretch;
      border: 1px solid rgba(40,100,160,0.45);
      background: rgba(0,6,18,0.8);
    }
    #post-input {
      background: transparent;
      border: none; border-right: 1px solid rgba(40,100,160,0.35);
      color: rgba(255,255,255,0.88); padding: 10px 14px;
      font-size: 12px; font-family: 'Courier New', monospace;
      width: 320px; outline: none;
    }
    #post-input:focus { background: rgba(255,200,60,0.03); }
    #post-input::placeholder { color: rgba(80,170,220,0.3); }
    #post-btn {
      background: rgba(255,200,60,0.08);
      border: none;
      color: rgba(255,215,80,0.85); padding: 10px 18px;
      cursor: pointer; font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 2px;
      transition: background 0.18s, color 0.18s;
    }
    #post-btn:hover { background: rgba(255,200,60,0.2); color: rgba(255,225,100,1); }

    /* ── Mouse hint (bottom right) ───────────────────── */
    #mouse-hint {
      position: absolute; bottom: 28px; right: 22px; z-index: 10;
      pointer-events: none; font-size: 9px; color: rgba(80,170,220,0.3);
      letter-spacing: 1px; line-height: 1.8;
      text-align: right;
    }

    /* ── Content popup ───────────────────────────────── */
    .content-label {
      position: absolute; z-index: 15; pointer-events: none;
      background: rgba(0,6,18,0.8);
      border: 1px solid rgba(100,220,180,0.3);
      color: rgba(100,220,180,0.85);
      padding: 5px 9px; font-size: 10px; max-width: 160px;
      line-height: 1.4; opacity: 0; transition: opacity 0.5s;
    }
    .content-label.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="vignette"></div>
  <div id="scanlines"></div>

  <div id="loading">
    ENTERING THE BUILDING
    <div id="loading-sub">signing in...</div>
  </div>

  <div id="canvas-container"></div>

  <!-- Navigation Arrows -->
  <div id="nav-arrows">
    <div class="nav-arrow" id="arrow-up"       data-dir="up">↑</div>
    <div class="nav-arrow" id="arrow-down"     data-dir="down">↓</div>
    <div class="nav-arrow" id="arrow-left"     data-dir="left">←</div>
    <div class="nav-arrow" id="arrow-right"    data-dir="right">→</div>
    <div class="nav-arrow" id="arrow-forward"  data-dir="forward" title="deeper (Z+)">⊙</div>
    <div class="nav-arrow" id="arrow-backward" data-dir="backward" title="shallower (Z-)">⊗</div>
  </div>

  <div id="hint-tooltip"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">
      <div class="hud-label">INTIMACY</div>
      <div class="hud-bar-track"><div class="hud-bar-fill" id="bar-x" style="width:50%"></div></div>
      <div class="hud-val" id="val-x">50</div>
    </div>
    <div class="hud-row">
      <div class="hud-label">RESONANCE</div>
      <div class="hud-bar-track"><div class="hud-bar-fill" id="bar-y" style="width:50%"></div></div>
      <div class="hud-val" id="val-y">50</div>
    </div>
    <div class="hud-row">
      <div class="hud-label">ENERGY</div>
      <div class="hud-bar-track"><div class="hud-bar-fill" id="bar-z" style="width:50%"></div></div>
      <div class="hud-val" id="val-z">50</div>
    </div>
  </div>

  <div id="axis-legend">
    ← <span>public</span> · <span>private</span> →<br>
    ↓ <span>friction</span> · <span>resonance</span> ↑<br>
    ⊗ <span>ambient</span> · <span>urgent</span> ⊙
  </div>

  <div id="z-indicator">DEPTH</div>

  <div id="users-panel"></div>

  <div id="post-ui">
    <input id="post-input" type="text" placeholder="type a thought → generates an image · move arrows to morph it" maxlength="180">
    <button id="post-btn">transmit</button>
  </div>

  <div id="mouse-hint">drag · rotate<br>scroll · zoom</div>

  <script type="module" src="main.js"></script>
</body>
</html>
