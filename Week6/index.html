<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shape World — Week 6</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.162.0",
      "three/addons/": "https://esm.sh/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ===== AUTH OVsssssERLAY ===== -->
  <div id="auth-overlay">
    <div id="auth-card">
      <div class="auth-logo">⬡</div>
      <h1>Shape World</h1>
      <p class="auth-sub">A shared 3D space</p>

      <!-- Google -->
      <button id="google-sign-in-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <!-- Email / Password fields -->
      <input type="email" id="email" placeholder="email" autocomplete="email" />
      <input type="password" id="password" placeholder="password" autocomplete="current-password" />

      <p id="auth-error" class="error-msg hidden"></p>

      <div class="auth-email-btns">
        <button id="email-signin-btn">Sign In</button>
        <button id="email-signup-btn">Sign Up</button>
      </div>
    </div>
  </div>

  <!-- ===== USERNAME OVERLAY ===== -->
  <div id="username-overlay" class="hidden">
    <div id="username-card">
      <div class="auth-logo">✦</div>
      <h2>Choose a username</h2>
      <p class="auth-sub">This will appear above your shapes</p>
      <input id="username-input" type="text" maxlength="20" placeholder="enter username..." autocomplete="off" />
      <button id="username-submit-btn">Enter Shape World</button>
      <p id="username-error" class="error-msg hidden">Username must be at least 2 characters.</p>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div id="app" class="hidden">

    <!-- Three.js canvas + CSS2D label overlay injected here by JS -->
    <div id="canvas-container"></div>

    <!-- Creator badge — only visible to CREATOR_EMAIL account -->
    <div id="creator-badge" class="hidden">CREATOR VIEW</div>

    <!-- Bottom toolbar -->
    <div id="toolbar">

      <div id="shape-palette">
        <div class="toolbar-shape" data-type="box">
          <div class="shape-icon shape-icon--box"></div>
          <span>Box</span>
        </div>
        <div class="toolbar-shape" data-type="rect">
          <div class="shape-icon shape-icon--rect"></div>
          <span>Rect</span>
        </div>
        <div class="toolbar-shape" data-type="cone">
          <div class="shape-icon shape-icon--cone"></div>
          <span>Cone</span>
        </div>
        <div class="toolbar-shape" data-type="prism">
          <div class="shape-icon shape-icon--prism"></div>
          <span>Prism</span>
        </div>
      </div>

      <div class="toolbar-divider"></div>

      <div id="color-palette">
        <div class="color-swatch selected" data-color="#e74c3c" style="background:#e74c3c" title="Red"></div>
        <div class="color-swatch" data-color="#3498db" style="background:#3498db" title="Blue"></div>
        <div class="color-swatch" data-color="#2ecc71" style="background:#2ecc71" title="Green"></div>
        <div class="color-swatch" data-color="#f1c40f" style="background:#f1c40f" title="Yellow"></div>
        <div class="color-swatch" data-color="#9b59b6" style="background:#9b59b6" title="Purple"></div>
        <label class="color-custom-wrap" title="Custom color">
          <input type="color" id="custom-color-input" value="#e74c3c" />
          <span class="color-custom-icon">+</span>
        </label>
      </div>

      <div class="toolbar-divider"></div>

      <div id="toolbar-user-info">
        <span id="toolbar-username"></span>
        <button id="sign-out-btn">Sign Out</button>
      </div>

    </div>

    <!-- Recolor popover -->
    <div id="recolor-popover" class="hidden">
      <p class="popover-label">Recolor shape</p>
      <div id="recolor-swatches"></div>
      <label class="color-custom-wrap recolor-custom">
        <input type="color" id="recolor-custom-input" value="#e74c3c" />
        <span class="color-custom-icon" style="color:rgba(255,255,255,0.7);font-size:10px;letter-spacing:.5px">CUSTOM</span>
      </label>
      <button id="recolor-close-btn">✕</button>
      <button id="delete-shape-btn">🗑 Delete</button>
    </div>

  </div>

  <!-- Firebase compat CDN (classic scripts load before ES module) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script type="module" src="main.js"></script>
</body>
</html>
